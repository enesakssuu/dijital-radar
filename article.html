<!doctype html>
<html lang="tr">
<head>

  <title>Dijital Radar Haber</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">

<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="index.html" aria-label="Dijital Radar ana sayfa">
        <img src="assets/logo.svg" alt="Dijital Radar" width="260" height="64">

      <nav class="top-nav" aria-label="Ana menü">
        <a href="index.html">Bugün</a>

        <span>/</span>
        <a id="breadcrumbDate" href="index.html">Yayın</a>

      <section class="share-box share-box-compact" aria-label="Haberi paylaş">
        <div class="share-actions">
          <button class="share-button primary" type="button" id="nativeShareButton">Paylaş</button>

        <a class="secondary-link" href="archive.html">Arşive dön</a>

        </div>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span>Dijital Radar</span>
      <span>Haber detay sayfası</span>
    </div>
